# --- APPLICATION ---
spring.application.name=Leviathan
server.port=8080

# --- MULTIPART CONFIG (THE FIX) ---
# Resolve the multipart request before it hits security filters
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.resolve-lazily=true

# --- DOCKER & DATABASE ---
spring.docker.compose.enabled=true
spring.docker.compose.lifecycle-management=start-only
spring.docker.compose.registration=skip

# Using 3307 as per your previous setup - Ensure Docker is mapped to this port
spring.datasource.url=jdbc:mysql://localhost:3307/lextracker_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- HIKARI POOL (Performance Tuning) ---
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# --- JPA / HIBERNATE ---
# Change to 'validate' once your tables are stable to stop 'alter table' lag
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# CRITICAL: Disable OSIV to prevent connection hanging/spinning
spring.jpa.open-in-view=false

# Remove manual dialect if using Hibernate 6+ (let it auto-detect)
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# --- LOGGING ---
logging.level.com.leviathanledger.leviathan=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.web=INFO