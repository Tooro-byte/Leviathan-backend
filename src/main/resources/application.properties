spring.application.name=Leviathan

# Docker Compose settings - start containers but DON'T fail app startup if db is slow
spring.docker.compose.enabled=true
spring.docker.compose.lifecycle-management=start-only
spring.docker.compose.registration=skip

# Database connection
spring.datasource.url=jdbc:mysql://localhost:3307/lextracker_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hikari connection pool - more forgiving during slow startup
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect