# --- APPLICATION ---
spring.application.name=Leviathan
server.port=8080

# JWT SECURITY CONFIG (Matches JwtUtils @Value)
lextracker.app.jwtSecret=LeviathanLedgerSecretKey2026_Secure_Operational_Vault_Key_Battlefield_Ready
lextracker.app.jwtExpirationMs=86400000

# MULTIPART (File Uploads)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.resolve-lazily=true

# --- DOCKER & DATABASE ---
spring.docker.compose.enabled=true
spring.docker.compose.lifecycle-management=start-only
spring.docker.compose.registration=skip

# DATABASE CONNECTION (Port 3307)
spring.datasource.url=jdbc:mysql://localhost:3307/lextracker_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- HIKARI POOL (Performance Tuning) ---
# Increased timeout to 60s to prevent Starvation Warnings
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# --- JPA / HIBERNATE ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- LOGGING ---
logging.level.com.leviathanledger.leviathan=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=DEBUG