services:
  db:
    image: mysql:8.4
    container_name: leviathan-db
    restart: always
    environment:
      MYSQL_DATABASE: lextracker_db
      MYSQL_ROOT_PASSWORD: admin
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent", "-u", "root", "-padmin"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: